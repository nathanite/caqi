name: Deploy site
 
on:
  push:
    branches: [main]
 
permissions:
  contents: read
  pages: write
  id-token: write
 
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Generate config.js from secrets
        run: |
          sed \
            -e "s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g" \
            -e "s|__SUPABASE_ANON_KEY__|${{ secrets.SUPABASE_ANON_KEY }}|g" \
            config.template.js > config.js
 
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
 
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
 
